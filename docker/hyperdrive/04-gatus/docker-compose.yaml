---
name: gatus

services:
  gatus:
    image: ghcr.io/twin/gatus:v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
    container_name: gatus
    restart: unless-stopped
    environment:
      GATUS_DELAY_START_SECONDS: 5
      GATUS_CONFIG_PATH: /config
      GATUS_WEB_PORT: 8080
      TELEGRAM_TOKEN: ${GATUS_TELEGRAM_TOKEN}
      TELEGRAM_ID: ${GATUS_TELEGRAM_ID}
      REMOTE_STATUS_HOSTNAME: status.codewalker.dev
      REMOTE_HEARTBEAT_TOKEN: ${GATUS_REMOTE_HEARTBEAT_TOKEN}
    volumes:
      - gatus-config:/config
    configs:
      - source: gatus_config
        target: /config/config.yaml

volumes:
  gatus-config:

configs:
  gatus_config:
    file: ./config/config.yaml

networks:
  default:
    name: edge
    external: true

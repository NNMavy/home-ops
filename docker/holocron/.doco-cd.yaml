---
working_dir: ./docker/holocron
auto_discovery:
  enabled: true
  depth: 1
  delete: true
external_secrets:
  OVH_APPLICATION_KEY: op://services/OVHcloud/traefik-application-key
  OVH_APPLICATION_SECRET: op://services/OVHcloud/traefik-application-secret
  OVH_CONSUMER_KEY: op://services/OVHcloud/traefik-consumer-key
force_recreate: false
reconciliation:
  enabled: true
  interval: 3600
